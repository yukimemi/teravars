[package]
name = "teravars"
version = "0.1.2"
edition = "2024"
rust-version = "1.85"
authors = ["yukimemi <yukimemi@gmail.com>"]
license = "MIT"
description = "Tera templating + smart [vars] handling for self-rendering TOML configs"
repository = "https://github.com/yukimemi/teravars"
readme = "README.md"
categories = ["template-engine", "config"]
keywords = ["tera", "template", "toml", "config"]

[features]
default = ["std-helpers"]
std-helpers = []
shell = []
merge = []
tracing = ["dep:tracing"]

[dependencies]
tera = "1.20"
toml = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
whoami = "1"

tracing = { version = "0.1", optional = true }

[dev-dependencies]
pretty_assertions = "1"
tempfile = "3"
