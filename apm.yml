name: teravars
version: 0.1.3
description: |
  Dev-consumer APM config for the teravars repo. teravars itself is a Rust
  library (not a skill / instruction package), so this apm.yml only exists
  to install agent skills that contributors want available while working
  on teravars — currently just the `renri` skill so AI sessions can
  manage worktrees / jj workspaces while developing.
author: yukimemi
dependencies:
  apm:
    - yukimemi/renri#v0.1.5
  mcp: []
includes: auto
scripts: {}
